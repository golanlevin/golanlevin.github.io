<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.plotsvg@latest/lib/p5.plotSvg.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <h1>Animation Grid Generator</h1>
        <p class="sidebar-copy">
          Create a printable frame-sheet template for hand-drawn Plottimation animations.
        </p>

        <label class="control">
          <span>Paper Size</span>
          <select id="paperPreset">
            <option value="letter" selected>Letter (11×8.5 in)</option>
            <option value="legal">Legal (14×8.5 in)</option>
            <option value="tabloid">Tabloid (17×11 in)</option>
            <option value="12x9">12×9 in</option>
            <option value="18x12">18×12 in</option>
            <option value="24x18">24×18 in</option>
            <option value="36x24">36×24 in</option>
            <option value="a4">A4 (297×210 mm)</option>
            <option value="a3">A3 (420×297 mm)</option>
            <option value="a2">A2 (594×420 mm)</option>
            <option value="a1">A1 (841×594 mm)</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <div id="customPaperFields" class="custom-paper-fields" hidden>
          <label class="control">
            <span>Page Width (in)</span>
            <input id="customPaperWidth" type="number" min="1" max="60" step="0.1" value="12.0" />
          </label>
          <label class="control">
            <span>Page Height (in)</span>
            <input id="customPaperHeight" type="number" min="1" max="60" step="0.1" value="12.0" />
          </label>
        </div>

        <fieldset class="control radio-control">
          <legend>Page Orientation</legend>
          <label class="radio-option">
            <input id="orientationLandscape" type="radio" name="pageOrientation" value="landscape" checked />
            <span>Landscape</span>
          </label>
          <label class="radio-option">
            <input id="orientationPortrait" type="radio" name="pageOrientation" value="portrait" />
            <span>Portrait</span>
          </label>
        </fieldset>

        <fieldset class="control radio-control">
          <legend>Marker Type</legend>
          <label class="radio-option">
            <input id="markerTypeCrosses" type="radio" name="markerType" value="crosses" checked />
            <span>Crosses</span>
          </label>
          <label class="radio-option">
            <input id="markerTypeDots" type="radio" name="markerType" value="dots" />
            <span>Dots</span>
          </label>
        </fieldset>

        <label class="control">
          <span class="control-heading">Frame Aspect Ratio <output id="aspectValue" for="aspectSlider">1.33</output></span>
          <input id="aspectSlider" type="range" min="0.5" max="2.0" step="0.01" value="1.33" />
        </label>

        <label class="control">
          <span class="control-heading">Columns <output id="colsValue" for="colsSlider">5</output></span>
          <input id="colsSlider" type="range" min="1" max="10" step="1" value="5" />
        </label>

        <label class="control">
          <span class="control-heading">Rows <output id="rowsValue" for="rowsSlider">4</output></span>
          <input id="rowsSlider" type="range" min="1" max="10" step="1" value="4" />
        </label>

        <label class="control">
          <span class="control-heading">Side Margins <output id="marginValue" for="marginSlider">0.75 in</output></span>
          <input id="marginSlider" type="range" min="0.5" max="1.5" step="0.01" value="0.75" />
        </label>

        <label class="control">
          <span class="control-heading">Marker Size <output id="markerSizeValue" for="markerSizeSlider">0.20 in</output></span>
          <input id="markerSizeSlider" type="range" min="0.20" max="0.40" step="0.01" value="0.20" />
        </label>

        <label class="control">
          <span class="control-heading">Gutter <output id="gutterValue" for="gutterSlider">0.30 in</output></span>
          <input id="gutterSlider" type="range" min="0.25" max="0.75" step="0.01" value="0.30" />
        </label>

        <label class="control">
          <span class="control-heading">Guide Grid <output id="guideGridValue" for="guideGridSlider">0.125 in</output></span>
          <input id="guideGridSlider" type="range" min="0.1" max="0.5" step="0.005" value="0.125" />
        </label>

        <label class="checkbox-control">
          <input id="showWarningsCheckbox" type="checkbox" checked />
          <span>Show out-of-bounds graphics</span>
        </label>

        <label class="checkbox-control">
          <input id="drawGuidesCheckbox" type="checkbox" checked />
          <span>Draw non-repro-blue grids</span>
        </label>

        <label class="checkbox-control">
          <input id="drawFramesCheckbox" type="checkbox" />
          <span>Draw black frame outlines</span>
        </label>

        <button id="exportSvgButton" type="button" data-tooltip="">Export SVG</button>
      </aside>

      <section class="canvas-panel">
        <div id="canvasWrap"></div>
      </section>
    </main>
    <script src="sketch.js"></script>
  </body>
</html>
